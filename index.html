    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>

    <script>
        const bgVideo = document.getElementById('bg-video');
        const videoToggle = document.getElementById('video-toggle');
        const videoToggleText = document.getElementById('video-toggle-text');
        const videoToggleIcon = videoToggle.querySelector('i');

        videoToggle.addEventListener('click', () => {
            if (bgVideo.paused) {
                bgVideo.play();
                videoToggleText.textContent = 'Pause';
                videoToggleIcon.classList.replace('fa-play', 'fa-pause');
            } else {
                bgVideo.pause();
                videoToggleText.textContent = 'Play';
                videoToggleIcon.classList.replace('fa-pause', 'fa-play');
            }
        });
    </script>
